products:
  # Docs imports use explicit seed URLs for stable POC scope. A seed only uses
  # child_depth when the source page's "In this section" children are part of
  # the selected import scope.
  - id: redstor
    label: Redstor
    canonical_host: helpdesk.redstor.com
    sources:
      kb:
        id: redstor-helpdesk
        type: freshdesk_public
        base_url: https://helpdesk.redstor.com
        area: redstor
        seeds:
          - /support/solutions
        folders:
          - folder: Guides
            source_url: /support/solutions/folders/4000040908
            route_base: redstor/kb/guides
            limit: 10
          - folder: Troubleshooting
            source_url: /support/solutions/folders/4000040906
            route_base: redstor/kb/troubleshooting
            limit: 10
          - folder: Release Notes
            source_url: /support/solutions/folders/4000040904
            route_base: redstor/kb/release-notes
            limit: 5
        scoped_kb_roots:
          - /support/solutions/folders/4000040908
          - /support/solutions/folders/4000040906
          - /support/solutions/folders/4000040904
        exclude_mirrors:
          - https://webtitancloud.freshdesk.com/support/solutions/4000010601

  - id: titanhq-platform
    label: TitanHQ Platform
    canonical_host: support.titanhq.com
    sources:
      docs:
        id: titanhq-support-docs-platform
        type: titanhq_static_docs_branch
        base_url: https://support.titanhq.com
        area: titanhq-platform
        route_base: titanhq/platform/docs
        breadcrumbs:
          - TitanHQ
          - Platform
          - Docs
        seeds:
          - /en/69450-welcome-to-the-titanhq-platform-.html
          - /en/70563-msp-dashboard.html
          - /en/70565-msp-dashboard.html
          - /en/69426-customers.html
          - /en/69428-customers.html
          - /en/69429-add-a-customer-account.html
          - /en/71401-delete-a-customer-account.html
          - /en/69411-settings.html
          - /en/69413-msp-settings.html
          - /en/69414-msp-administrators.html
          - /en/69421-license-usage.html
          - /en/75330-top-navigation-bar.html
        branch_label: Platform

  - id: spamtitan
    label: SpamTitan
    canonical_host: helpdesk.spamtitan.com
    sources:
      kb:
        id: spamtitan-helpdesk
        type: freshdesk_public
        base_url: https://helpdesk.spamtitan.com
        area: spamtitan-kb
        seeds:
          - /support/home
        folders:
          - folder: Solutions
            source_url: /support/solutions/folders/4000036516
            route_base: titanhq/products/spamtitan/kb/solutions
            limit: 5
          - folder: Announcements
            source_url: /support/solutions/folders/4000036705
            route_base: titanhq/products/spamtitan/kb/announcements
            limit: 5
          - folder: 'Getting Started: SpamTitan Cloud'
            source_url: /support/solutions/folders/4000037714
            route_base: titanhq/products/spamtitan/kb/getting-started-cloud
            limit: 20
          - folder: Link Lock
            source_url: /support/solutions/folders/4000037715
            route_base: titanhq/products/spamtitan/kb/link-lock
            limit: 20
        scoped_kb_roots:
          - /support/solutions/4000009289
        exclude_mirrors:
          - https://webtitancloud.freshdesk.com/support/solutions/4000009289
      docs:
        - id: titanhq-support-docs-spamtitan-skellig
          type: titanhq_static_docs_branch
          base_url: https://support.titanhq.com
          area: spamtitan-skellig
          route_base: titanhq/products/spamtitan/docs/skellig-9
          breadcrumbs:
            - TitanHQ
            - Products
            - SpamTitan
            - Docs
            - Skellig 9
          seeds:
            - /en/56985-welcome-to-spamtitan-.html
            - /en/59382-navigating-levels-in-spamtitan.html
            - path: /en/61767-spamtitan-release-notes.html
              child_depth: 1
            - /en/55539-spamtitan-msp-setup.html
            - path: /en/55571-log-in-to-spamtitan.html
              child_depth: 1
            - path: /en/55582-update-your-security-settings.html
              child_depth: 1
            - /en/57004-adding-customers.html
            - /en/57129-global-allow---block-list.html
            - /en/55542-spamtitan-msp-admin-guide.html
            - /en/60060-msp-overview.html
            - /en/60370-link-lock.html
          branch_label: SpamTitan
          product_stream: skellig
          version_range: '9.00+'
          preferred: true
        - id: titanhq-docs-spamtitan-legacy
