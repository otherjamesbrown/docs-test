products:
  # Docs imports use explicit seed URLs for stable POC scope. A seed only uses
  # child_depth when the source page's "In this section" children are part of
  # the selected import scope.
  - id: redstor
    label: Redstor
    canonical_host: helpdesk.redstor.com
    sources:
      kb:
        id: redstor-helpdesk
        type: freshdesk_public
        base_url: https://helpdesk.redstor.com
        area: redstor
        seeds:
          - /support/solutions
        folders:
          - folder: Guides
            source_url: /support/solutions/folders/4000040908
            route_base: redstor/kb/guides
            limit: 10
          - folder: Troubleshooting
            source_url: /support/solutions/folders/4000040906
            route_base: redstor/kb/troubleshooting
            limit: 10
          - folder: Release Notes
            source_url: /support/solutions/folders/4000040904
            route_base: redstor/kb/release-notes
            limit: 5
        scoped_kb_roots:
          - /support/solutions/folders/4000040908
          - /support/solutions/folders/4000040906
          - /support/solutions/folders/4000040904
        exclude_mirrors:
          - https://webtitancloud.freshdesk.com/support/solutions/4000010601

  - id: titanhq-platform
    label: TitanHQ Platform
    canonical_host: support.titanhq.com
    sources:
      docs:
        id: titanhq-support-docs-platform
        type: titanhq_static_docs_branch
        base_url: https://support.titanhq.com
        area: titanhq-platform
        route_base: titanhq/platform/docs
        breadcrumbs:
          - TitanHQ
          - Platform
          - Docs
        seeds:
          - /en/69450-welcome-to-the-titanhq-platform-.html
          - /en/70563-msp-dashboard.html
          - /en/70565-msp-dashboard.html
          - /en/69426-customers.html
          - /en/69428-customers.html
          - /en/69429-add-a-customer-account.html
          - /en/71401-delete-a-customer-account.html
          - /en/69411-settings.html
          - /en/69413-msp-settings.html
          - /en/69414-msp-administrators.html
          - /en/69421-license-usage.html
          - /en/75330-top-navigation-bar.html
        branch_label: Platform

